{% extends "base.html" %}

{% block content %}
<div class="container">
  <center>
    <h1>{{section.title}}</h1>
  </center>
</div>

<hr>

<section class="container">
  {% for post in section.pages %}
  <article>
    <div class="grid">
      <div style="display:flex;flex-direction:row;justify-content:space-between;">
        <a class="contrast" href="{{post.permalink}}">{{post.title}}</a>
        <div>
          {{post.date}}
        </div>
      </div>
    </div>
  </article>
  {% endfor %}
</section>
{% endblock %}
